services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: shield
      POSTGRES_USER: shield
      POSTGRES_PASSWORD: shield
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shield -d shield"]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://shield:shield@db/shield
      ALEMBIC_DATABASE_URL: postgresql://shield:shield@db/shield
      SHIELD_JWT_SECRET: dev-secret-change-in-production
      REGISTRY_SERVICE_URL: http://registry:8002
    depends_on:
      db:
        condition: service_healthy

  policy:
    build: ./policy
    expose:
      - "8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://shield:shield@db/shield
      POLICY_DIR: /app/policies
    volumes:
      - ./policies:/app/policies:ro
    depends_on:
      db:
        condition: service_healthy

  registry:
    build: ./registry
    expose:
      - "8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://shield:shield@db/shield
      ALEMBIC_DATABASE_URL: postgresql://shield:shield@db/shield
      SHIELD_JWT_SECRET: dev-secret-change-in-production
      STORAGE_BACKEND: local
      LOCAL_STORAGE_DIR: /app/storage
      REGISTRY_BASE_URL: http://registry:8002
    volumes:
      - registry_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  registry_storage:
